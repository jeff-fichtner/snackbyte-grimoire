<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#1a1712; }
</style>
</helmet>

<div style="display:flex; flex-direction:column; align-items:center; gap:30px; padding:56px 40px; font-family:'Spectral',serif;">

  <div style="display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center;">
    <div style="font-size:20px; color:#e9e1d1;">Grimoire &mdash; app icon</div>
    <div style="font-family:ui-monospace,monospace; font-size:11px; color:#8a8272;">grimoire-app-icon.png &middot; 512&times;512 &middot; upload as the Discord app icon</div>
  </div>

  <div style="display:flex; align-items:flex-start; gap:44px;">

  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
  <!-- THE ICON : 512x512 -->
  <div id="app-icon" style="width:512px; height:512px; position:relative; overflow:hidden; background:radial-gradient(120% 120% at 50% 32%, #211c14 0%, #12100c 70%, #0b0a08 100%);">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:388px; height:388px; border:2px solid rgba(205,163,73,0.14); border-radius:50%;"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:312px; height:312px; border:6px solid #cda349; border-radius:50%; box-shadow:0 0 60px -10px rgba(205,163,73,0.4), inset 0 0 40px -18px rgba(205,163,73,0.5);"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:150px; height:150px; background:linear-gradient(135deg,#e4c374 0%, #cda349 48%, #a67c2e 100%); border-radius:22px; box-shadow:0 8px 30px -6px rgba(0,0,0,0.6);"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:70px; height:70px; border:5px solid rgba(26,23,18,0.9); border-radius:12px;"></div>
  </div>
  <span style="font-family:ui-monospace,monospace; font-size:11px; color:#a89f8e;">production &middot; gold</span>
  </div>

  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
  <!-- THE DEV ICON : 512x512 -->
  <div id="app-icon-dev" style="width:512px; height:512px; position:relative; overflow:hidden; background:radial-gradient(120% 120% at 50% 32%, #16191d 0%, #0d0f12 70%, #08090b 100%);">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:388px; height:388px; border:2px solid rgba(122,150,178,0.14); border-radius:50%;"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:312px; height:312px; border:6px dashed #7a96b2; border-radius:50%; box-shadow:0 0 60px -10px rgba(122,150,178,0.35), inset 0 0 40px -18px rgba(122,150,178,0.45);"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:150px; height:150px; background:linear-gradient(135deg,#a9c0d6 0%, #7a96b2 48%, #52697f 100%); border-radius:22px; box-shadow:0 8px 30px -6px rgba(0,0,0,0.6);"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:70px; height:70px; border:5px solid rgba(13,15,18,0.9); border-radius:12px;"></div>
    <!-- DEV stamp -->
    <div style="position:absolute; bottom:44px; left:50%; transform:translate(-50%,0); font-family:ui-monospace,monospace; font-weight:700; font-size:34px; letter-spacing:0.32em; color:#0d0f12; background:#a9c0d6; padding:5px 12px 5px 20px; border-radius:5px;">DEV</div>
  </div>
  <span style="font-family:ui-monospace,monospace; font-size:11px; color:#a89f8e;">dev &middot; slate + stamp</span>
  </div>

  </div>

  <!-- preview at Discord display sizes -->
  <div style="display:flex; align-items:center; gap:26px; padding-top:4px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:128px; height:128px; border-radius:24px; overflow:hidden; position:relative; background:radial-gradient(120% 120% at 50% 32%, #211c14 0%, #12100c 70%, #0b0a08 100%);">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:78px; height:78px; border:3px solid #cda349; border-radius:50%; box-shadow:inset 0 0 10px -4px rgba(205,163,73,0.5);"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:37px; height:37px; background:linear-gradient(135deg,#e4c374,#a67c2e); border-radius:6px;"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:17px; height:17px; border:2px solid rgba(26,23,18,0.9); border-radius:3px;"></div>
      </div>
      <span style="font-family:ui-monospace,monospace; font-size:10px; color:#6a6357;">rounded 128</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; border-radius:50%; overflow:hidden; position:relative; background:radial-gradient(120% 120% at 50% 32%, #211c14 0%, #12100c 70%, #0b0a08 100%);">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border:2px solid #cda349; border-radius:50%;"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:19px; height:19px; background:linear-gradient(135deg,#e4c374,#a67c2e); border-radius:3px;"></div>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(45deg); width:9px; height:9px; border:1.5px solid rgba(26,23,18,0.9); border-radius:2px;"></div>
      </div>
      <span style="font-family:ui-monospace,monospace; font-size:10px; color:#6a6357;">circle 64</span>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
