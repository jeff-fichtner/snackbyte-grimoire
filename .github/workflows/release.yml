name: release

# Tags a release on every push to a channel branch declared in environments.json.
# The Action tags ONLY — it never creates a commit. Deploy is a separate step, added
# below the tag step and gated on `is-env`, once there is something to deploy.

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

concurrency:
  # Serialize per branch so two pushes cannot race for the same build number.
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Step outputs are not visible to dependent jobs unless the job re-exports them.
    # Without this block `needs.release.outputs.*` is silently empty, the deploy job's
    # `if` evaluates false, and nothing deploys — with no error anywhere.
    outputs:
      is-env: ${{ steps.release.outputs.is-env }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history is required — the derivation refuses a shallow clone, which
          # would hide existing tags and reuse a number.
          fetch-depth: 0

      - id: release
        uses: jeff-fichtner/snackbyte-release-flow-action@v1
        # Inputs all default: branch=github.ref_name, manifest=./environments.json,
        # MAJOR.MINOR from package.json, version-strategy=build-id (a deployable
        # service — the PATCH is a build counter, not a compatibility promise).

      - name: Report the release tag
        if: steps.release.outputs.is-env == 'true'
        run: echo "Tagged ${{ steps.release.outputs.tag }}"

  # Deploy only what was actually tagged. Gated on is-env so a push to a branch that is not
  # a release channel does nothing, and keyed off the Action's tag so the image built is the
  # one the tag names — never "whatever HEAD happens to be".
  deploy:
    needs: release
    if: needs.release.outputs.is-env == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Branch -> environment. This mapping lives HERE, in one visible place, rather than as
      # defaults inside cloudbuild.yaml, because a wrong default there deploys production
      # against staging's data and says nothing. An unrecognized branch is a hard failure:
      # `environments.json` gates which branches reach this job at all, so arriving here with
      # an unmapped name means the two files disagree, and guessing would pick an environment.
      - id: env
        name: Resolve the target environment from the branch
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "service=grimoire"                               >> "$GITHUB_OUTPUT"
              echo "db_secret=grimoire-prod-database-url"           >> "$GITHUB_OUTPUT"
              echo "bot_secret=grimoire-prod-discord-bot-token"     >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "service=grimoire-staging"                       >> "$GITHUB_OUTPUT"
              echo "db_secret=grimoire-staging-database-url"        >> "$GITHUB_OUTPUT"
              echo "bot_secret=grimoire-staging-discord-bot-token"  >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Branch '${{ github.ref_name }}' has no environment mapping."
              echo "::error::environments.json and this workflow disagree. Refusing to guess."
              exit 1
              ;;
          esac

      - name: Build and deploy
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --substitutions \
          TAG_NAME=${{ needs.release.outputs.tag }},\
          _SERVICE=${{ steps.env.outputs.service }},\
          _REGION=us-central1,\
          _DATABASE_URL_SECRET=${{ steps.env.outputs.db_secret }},\
          _BOT_TOKEN_SECRET=${{ steps.env.outputs.bot_secret }}
